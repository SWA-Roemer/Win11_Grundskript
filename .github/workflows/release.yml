# .github/workflows/release.yml

name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: version.txt mit Tag aktualisieren
        run: echo "${{ github.event.release.tag_name }}" > version.txt

      - name: Release ZIP erstellen
        run: |
          zip -r Win11_Grundskript.zip \
            apps_exkl_m365.txt \
            apps_standard.txt \
            execute_grundskript.bat \
            version.txt \
            windows_grundskript.ps1 \
            modules/

      - name: ZIP zum Release hinzufügen
        uses: softprops/action-gh-release@v2
        with:
          files: Win11_Grundskript.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
